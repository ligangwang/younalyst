name: Deploy to Cloud Run

on:
  pull_request:
    branches:
      - dev
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  push:
    branches:
      - dev
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Deploy target
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  GCP_REGION: us-central1

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify app
        run: npm run verify

  deploy-staging:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/dev') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    needs: verify
    runs-on: ubuntu-latest
    environment: staging
    env:
      # All these are set in GitHub Environment: Settings → Environments → staging
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      CLOUD_RUN_SERVICE_STAGING: ${{ vars.CLOUD_RUN_SERVICE_STAGING }}
      CLOUD_BUILD_SOURCE_STAGING_DIR: ${{ vars.CLOUD_BUILD_SOURCE_STAGING_DIR }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      FINNHUB_API_URL: ${{ vars.FINNHUB_API_URL }}
      TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
      TWELVE_DATA_API_URL: ${{ vars.TWELVE_DATA_API_URL }}
      EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
      EODHD_API_URL: ${{ vars.EODHD_API_URL }}
      EODHD_BULK_EOD_BUCKET: ${{ vars.EODHD_BULK_EOD_BUCKET }}
      INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
      AI_ANALYST_USER_ID: ${{ vars.AI_ANALYST_USER_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
      COMPANY_GRAPH_QUEUE_BATCH_SIZE: ${{ vars.COMPANY_GRAPH_QUEUE_BATCH_SIZE }}
      ENABLE_PRO_FEATURES: ${{ vars.ENABLE_PRO_FEATURES }}
      ENABLE_BILLING: ${{ vars.ENABLE_BILLING }}
      PRO_BILLING_BYPASS: ${{ vars.PRO_BILLING_BYPASS }}
      GOOGLE_ANALYTICS_ID: ${{ vars.GOOGLE_ANALYTICS_ID }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Debug staging deploy context
        env:
          GOOGLE_CLOUD_PROJECT: ${{ env.GCP_PROJECT_ID }}
          GOOGLE_CLOUD_REGION: ${{ env.GCP_REGION }}
          CLOUD_RUN_SERVICE_STAGING: ${{ env.CLOUD_RUN_SERVICE_STAGING }}
          CLOUD_BUILD_SOURCE_STAGING_DIR: ${{ env.CLOUD_BUILD_SOURCE_STAGING_DIR }}
          CLOUD_BUILD_USE_CUSTOM_SOURCE_STAGING: ${{ vars.CLOUD_BUILD_USE_CUSTOM_SOURCE_STAGING }}
        run: |
          set -euxo pipefail
          echo "GitHub environment: staging"
          echo "Project: ${GOOGLE_CLOUD_PROJECT}"
          echo "Region: ${GOOGLE_CLOUD_REGION}"
          echo "Service: ${CLOUD_RUN_SERVICE_STAGING}"
          echo "Source staging dir: ${CLOUD_BUILD_SOURCE_STAGING_DIR}"
          echo "Use custom source staging: ${CLOUD_BUILD_USE_CUSTOM_SOURCE_STAGING:-0}"
          echo "Authenticated accounts:"
          gcloud auth list
          echo "Application default credentials:"
          gcloud auth application-default print-access-token >/dev/null && echo "ADC available"
          echo "Active gcloud config:"
          gcloud config list
          if [[ "${CLOUD_BUILD_USE_CUSTOM_SOURCE_STAGING:-0}" == "1" ]] && [[ -n "${CLOUD_BUILD_SOURCE_STAGING_DIR}" ]]; then
            echo "Bucket access smoke test (custom source staging enabled):"
            bucket_root="$(echo "${CLOUD_BUILD_SOURCE_STAGING_DIR}" | sed -E 's#^(gs://[^/]+).*$#\1#')"
            gcloud storage ls "${bucket_root}" || echo "WARN: could not list bucket; custom source staging likely to fail"
          else
            echo "Skipping bucket smoke test; custom source staging is disabled"
          fi

      - name: Deploy staging
        env:
          GOOGLE_CLOUD_PROJECT: ${{ env.GCP_PROJECT_ID }}
          GOOGLE_CLOUD_REGION: ${{ env.GCP_REGION }}
          CLOUD_RUN_SERVICE_STAGING: ${{ env.CLOUD_RUN_SERVICE_STAGING }}
          CLOUD_BUILD_SOURCE_STAGING_DIR: ${{ env.CLOUD_BUILD_SOURCE_STAGING_DIR }}
          CLOUD_BUILD_USE_CUSTOM_SOURCE_STAGING: ${{ vars.CLOUD_BUILD_USE_CUSTOM_SOURCE_STAGING }}
          DEBUG_GCLOUD_DEPLOY: "1"
          GIT_SHA: ${{ github.sha }}
          APP_ENVIRONMENT: staging
          FINNHUB_API_KEY: ${{ env.FINNHUB_API_KEY }}
          FINNHUB_API_URL: ${{ env.FINNHUB_API_URL }}
          TWELVE_DATA_API_KEY: ${{ env.TWELVE_DATA_API_KEY }}
          TWELVE_DATA_API_URL: ${{ env.TWELVE_DATA_API_URL }}
          EODHD_API_TOKEN: ${{ env.EODHD_API_TOKEN }}
          EODHD_API_URL: ${{ env.EODHD_API_URL }}
          EODHD_BULK_EOD_BUCKET: ${{ env.EODHD_BULK_EOD_BUCKET }}
          INTERNAL_API_TOKEN: ${{ env.INTERNAL_API_TOKEN }}
          AI_ANALYST_USER_ID: ${{ env.AI_ANALYST_USER_ID }}
          OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ env.OPENAI_MODEL }}
          SEC_USER_AGENT: ${{ env.SEC_USER_AGENT }}
          COMPANY_GRAPH_QUEUE_BATCH_SIZE: ${{ env.COMPANY_GRAPH_QUEUE_BATCH_SIZE }}
          ENABLE_PRO_FEATURES: ${{ env.ENABLE_PRO_FEATURES }}
          ENABLE_BILLING: ${{ env.ENABLE_BILLING }}
          PRO_BILLING_BYPASS: ${{ env.PRO_BILLING_BYPASS }}
          GOOGLE_ANALYTICS_ID: ${{ env.GOOGLE_ANALYTICS_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ env.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ env.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ env.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ env.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ env.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ env.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ env.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ env.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
        run: npm run deploy:staging

      - name: Resolve staging URL
        id: staging-url
        run: |
          echo "url=$(gcloud run services describe $CLOUD_RUN_SERVICE_STAGING --region $GCP_REGION --format='value(status.url)')" >> "$GITHUB_OUTPUT"

      - name: Upsert staging company graph queue scheduler
        env:
          CLOUD_RUN_URL: ${{ steps.staging-url.outputs.url }}
          COMPANY_GRAPH_QUEUE_SCHEDULER_ENABLED: ${{ vars.COMPANY_GRAPH_QUEUE_SCHEDULER_ENABLED }}
          COMPANY_GRAPH_QUEUE_SCHEDULER_JOB: ${{ vars.COMPANY_GRAPH_QUEUE_SCHEDULER_JOB }}
          COMPANY_GRAPH_QUEUE_SCHEDULER_SCHEDULE: ${{ vars.COMPANY_GRAPH_QUEUE_SCHEDULER_SCHEDULE }}
          COMPANY_GRAPH_QUEUE_SCHEDULER_LIMIT: ${{ vars.COMPANY_GRAPH_QUEUE_SCHEDULER_LIMIT }}
          INTERNAL_API_TOKEN: ${{ env.INTERNAL_API_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${COMPANY_GRAPH_QUEUE_SCHEDULER_ENABLED:-0}" != "1" ]]; then
            echo "Company graph queue scheduler provisioning disabled for staging."
            exit 0
          fi
          if [[ -z "${INTERNAL_API_TOKEN:-}" ]]; then
            echo "INTERNAL_API_TOKEN is required to provision the company graph queue scheduler" >&2
            exit 1
          fi

          echo "Cloud Scheduler API must be enabled once for project ${GCP_PROJECT_ID}; this workflow only creates or updates the scheduler job."

          job_name="${COMPANY_GRAPH_QUEUE_SCHEDULER_JOB:-company-graph-queue-staging}"
          schedule="${COMPANY_GRAPH_QUEUE_SCHEDULER_SCHEDULE:-* * * * *}"
          limit="${COMPANY_GRAPH_QUEUE_SCHEDULER_LIMIT:-1}"
          body="$(jq -nc --argjson limit "$limit" '{ limit: $limit }')"
          uri="${CLOUD_RUN_URL}/api/internal/company-graph/process-queue"
          headers="Authorization=Bearer ${INTERNAL_API_TOKEN},Content-Type=application/json"

          if gcloud scheduler jobs describe "$job_name" --project "$GCP_PROJECT_ID" --location "$GCP_REGION" >/dev/null 2>&1; then
            gcloud scheduler jobs update http "$job_name" \
              --project "$GCP_PROJECT_ID" \
              --location "$GCP_REGION" \
              --schedule "$schedule" \
              --time-zone "America/New_York" \
              --uri "$uri" \
              --http-method POST \
              --update-headers "$headers" \
              --message-body "$body"
          else
            gcloud scheduler jobs create http "$job_name" \
              --project "$GCP_PROJECT_ID" \
              --location "$GCP_REGION" \
              --schedule "$schedule" \
              --time-zone "America/New_York" \
              --uri "$uri" \
              --http-method POST \
              --headers "$headers" \
              --message-body "$body"
          fi

      - name: Upsert staging EOD scheduler
        env:
          CLOUD_RUN_URL: ${{ steps.staging-url.outputs.url }}
          EOD_MAINTENANCE_SCHEDULER_ENABLED: ${{ vars.EOD_MAINTENANCE_SCHEDULER_ENABLED }}
          EOD_MAINTENANCE_SCHEDULER_JOB: ${{ vars.EOD_MAINTENANCE_SCHEDULER_JOB }}
          EOD_MAINTENANCE_SCHEDULER_LIMIT: ${{ vars.EOD_MAINTENANCE_SCHEDULER_LIMIT }}
          EOD_MAINTENANCE_SCHEDULER_DRY_RUN: ${{ vars.EOD_MAINTENANCE_SCHEDULER_DRY_RUN }}
          INTERNAL_API_TOKEN: ${{ env.INTERNAL_API_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${EOD_MAINTENANCE_SCHEDULER_ENABLED:-0}" != "1" ]]; then
            echo "EOD scheduler provisioning disabled for staging."
            exit 0
          fi
          if [[ -z "${INTERNAL_API_TOKEN:-}" ]]; then
            echo "INTERNAL_API_TOKEN is required to provision the EOD scheduler" >&2
            exit 1
          fi

          echo "Cloud Scheduler API must be enabled once for project ${GCP_PROJECT_ID}; this workflow only creates or updates the scheduler job."

          job_name="${EOD_MAINTENANCE_SCHEDULER_JOB:-daily-eod-maintenance-staging}"
          limit="${EOD_MAINTENANCE_SCHEDULER_LIMIT:-500}"
          dry_run="${EOD_MAINTENANCE_SCHEDULER_DRY_RUN:-false}"
          body="$(jq -nc --argjson limit "$limit" --argjson dryRun "$dry_run" '{ limit: $limit, dryRun: $dryRun }')"
          uri="${CLOUD_RUN_URL}/api/internal/daily-eod-maintenance"
          headers="Authorization=Bearer ${INTERNAL_API_TOKEN},Content-Type=application/json"

          if gcloud scheduler jobs describe "$job_name" --project "$GCP_PROJECT_ID" --location "$GCP_REGION" >/dev/null 2>&1; then
            gcloud scheduler jobs update http "$job_name" \
              --project "$GCP_PROJECT_ID" \
              --location "$GCP_REGION" \
              --schedule "0 20 * * 1-5" \
              --time-zone "America/New_York" \
              --uri "$uri" \
              --http-method POST \
              --update-headers "$headers" \
              --message-body "$body"
          else
            gcloud scheduler jobs create http "$job_name" \
              --project "$GCP_PROJECT_ID" \
              --location "$GCP_REGION" \
              --schedule "0 20 * * 1-5" \
              --time-zone "America/New_York" \
              --uri "$uri" \
              --http-method POST \
              --headers "$headers" \
              --message-body "$body"
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate staging smoke auth token
        id: staging-smoke-token
        run: |
          token="$(gcloud auth print-identity-token --audiences='${{ steps.staging-url.outputs.url }}')"
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Run staging smoke tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.staging-url.outputs.url }}
          PLAYWRIGHT_EXPECT_STAGING_BANNER: "1"
          PLAYWRIGHT_AUTH_BEARER_TOKEN: ${{ steps.staging-smoke-token.outputs.token }}
        run: npm run smoke:test

  deploy-production:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    env:
      # All these are set in GitHub Environment: Settings → Environments → production
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      CLOUD_RUN_SERVICE_PRODUCTION: ${{ vars.CLOUD_RUN_SERVICE_PRODUCTION }}
      CLOUD_BUILD_SOURCE_STAGING_DIR: ${{ vars.CLOUD_BUILD_SOURCE_STAGING_DIR }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      FINNHUB_API_URL: ${{ vars.FINNHUB_API_URL }}
      TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
      TWELVE_DATA_API_URL: ${{ vars.TWELVE_DATA_API_URL }}
      EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
      EODHD_API_URL: ${{ vars.EODHD_API_URL }}
      EODHD_BULK_EOD_BUCKET: ${{ vars.EODHD_BULK_EOD_BUCKET }}
      INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
      AI_ANALYST_USER_ID: ${{ vars.AI_ANALYST_USER_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
      COMPANY_GRAPH_QUEUE_BATCH_SIZE: ${{ vars.COMPANY_GRAPH_QUEUE_BATCH_SIZE }}
      ENABLE_PRO_FEATURES: ${{ vars.ENABLE_PRO_FEATURES }}
      ENABLE_BILLING: ${{ vars.ENABLE_BILLING }}
      PRO_BILLING_BYPASS: ${{ vars.PRO_BILLING_BYPASS }}
      GOOGLE_ANALYTICS_ID: ${{ vars.GOOGLE_ANALYTICS_ID }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Debug production deploy context
        env:
          GOOGLE_CLOUD_PROJECT: ${{ env.GCP_PROJECT_ID }}
          GOOGLE_CLOUD_REGION: ${{ env.GCP_REGION }}
          CLOUD_RUN_SERVICE_PRODUCTION: ${{ env.CLOUD_RUN_SERVICE_PRODUCTION }}
          CLOUD_BUILD_SOURCE_STAGING_DIR: ${{ env.CLOUD_BUILD_SOURCE_STAGING_DIR }}
          CLOUD_BUILD_USE_CUSTOM_SOURCE_STAGING: ${{ vars.CLOUD_BUILD_USE_CUSTOM_SOURCE_STAGING }}
        run: |
          set -euxo pipefail
          echo "GitHub environment: production"
          echo "Project: ${GOOGLE_CLOUD_PROJECT}"
          echo "Region: ${GOOGLE_CLOUD_REGION}"
          echo "Service: ${CLOUD_RUN_SERVICE_PRODUCTION}"
          echo "Source staging dir: ${CLOUD_BUILD_SOURCE_STAGING_DIR}"
          echo "Use custom source staging: ${CLOUD_BUILD_USE_CUSTOM_SOURCE_STAGING:-0}"
          echo "Authenticated accounts:"
          gcloud auth list
          echo "Application default credentials:"
          gcloud auth application-default print-access-token >/dev/null && echo "ADC available"
          echo "Active gcloud config:"
          gcloud config list
          if [[ "${CLOUD_BUILD_USE_CUSTOM_SOURCE_STAGING:-0}" == "1" ]] && [[ -n "${CLOUD_BUILD_SOURCE_STAGING_DIR}" ]]; then
            echo "Bucket access smoke test (custom source staging enabled):"
            bucket_root="$(echo "${CLOUD_BUILD_SOURCE_STAGING_DIR}" | sed -E 's#^(gs://[^/]+).*$#\1#')"
            gcloud storage ls "${bucket_root}" || echo "WARN: could not list bucket; custom source staging likely to fail"
          else
            echo "Skipping bucket smoke test; custom source staging is disabled"
          fi

      - name: Deploy production
        env:
          GOOGLE_CLOUD_PROJECT: ${{ env.GCP_PROJECT_ID }}
          GOOGLE_CLOUD_REGION: ${{ env.GCP_REGION }}
          CLOUD_RUN_SERVICE_PRODUCTION: ${{ env.CLOUD_RUN_SERVICE_PRODUCTION }}
          CLOUD_BUILD_SOURCE_STAGING_DIR: ${{ env.CLOUD_BUILD_SOURCE_STAGING_DIR }}
          CLOUD_BUILD_USE_CUSTOM_SOURCE_STAGING: ${{ vars.CLOUD_BUILD_USE_CUSTOM_SOURCE_STAGING }}
          DEBUG_GCLOUD_DEPLOY: "1"
          GIT_SHA: ${{ github.sha }}
          APP_ENVIRONMENT: production
          FINNHUB_API_KEY: ${{ env.FINNHUB_API_KEY }}
          FINNHUB_API_URL: ${{ env.FINNHUB_API_URL }}
          TWELVE_DATA_API_KEY: ${{ env.TWELVE_DATA_API_KEY }}
          TWELVE_DATA_API_URL: ${{ env.TWELVE_DATA_API_URL }}
          EODHD_API_TOKEN: ${{ env.EODHD_API_TOKEN }}
          EODHD_API_URL: ${{ env.EODHD_API_URL }}
          EODHD_BULK_EOD_BUCKET: ${{ env.EODHD_BULK_EOD_BUCKET }}
          INTERNAL_API_TOKEN: ${{ env.INTERNAL_API_TOKEN }}
          AI_ANALYST_USER_ID: ${{ env.AI_ANALYST_USER_ID }}
          OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ env.OPENAI_MODEL }}
          SEC_USER_AGENT: ${{ env.SEC_USER_AGENT }}
          COMPANY_GRAPH_QUEUE_BATCH_SIZE: ${{ env.COMPANY_GRAPH_QUEUE_BATCH_SIZE }}
          ENABLE_PRO_FEATURES: ${{ env.ENABLE_PRO_FEATURES }}
          ENABLE_BILLING: ${{ env.ENABLE_BILLING }}
          PRO_BILLING_BYPASS: ${{ env.PRO_BILLING_BYPASS }}
          GOOGLE_ANALYTICS_ID: ${{ env.GOOGLE_ANALYTICS_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ env.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ env.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ env.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ env.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ env.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ env.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ env.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ env.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
        run: npm run deploy:production

      - name: Resolve production URL
        id: production-url
        run: |
          echo "url=$(gcloud run services describe $CLOUD_RUN_SERVICE_PRODUCTION --region $GCP_REGION --format='value(status.url)')" >> "$GITHUB_OUTPUT"

      - name: Upsert production company graph queue scheduler
        env:
          CLOUD_RUN_URL: ${{ steps.production-url.outputs.url }}
          COMPANY_GRAPH_QUEUE_SCHEDULER_ENABLED: ${{ vars.COMPANY_GRAPH_QUEUE_SCHEDULER_ENABLED }}
          COMPANY_GRAPH_QUEUE_SCHEDULER_JOB: ${{ vars.COMPANY_GRAPH_QUEUE_SCHEDULER_JOB }}
          COMPANY_GRAPH_QUEUE_SCHEDULER_SCHEDULE: ${{ vars.COMPANY_GRAPH_QUEUE_SCHEDULER_SCHEDULE }}
          COMPANY_GRAPH_QUEUE_SCHEDULER_LIMIT: ${{ vars.COMPANY_GRAPH_QUEUE_SCHEDULER_LIMIT }}
          INTERNAL_API_TOKEN: ${{ env.INTERNAL_API_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${COMPANY_GRAPH_QUEUE_SCHEDULER_ENABLED:-0}" != "1" ]]; then
            echo "Company graph queue scheduler provisioning disabled for production."
            exit 0
          fi
          if [[ -z "${INTERNAL_API_TOKEN:-}" ]]; then
            echo "INTERNAL_API_TOKEN is required to provision the company graph queue scheduler" >&2
            exit 1
          fi

          echo "Cloud Scheduler API must be enabled once for project ${GCP_PROJECT_ID}; this workflow only creates or updates the scheduler job."

          job_name="${COMPANY_GRAPH_QUEUE_SCHEDULER_JOB:-company-graph-queue-production}"
          schedule="${COMPANY_GRAPH_QUEUE_SCHEDULER_SCHEDULE:-* * * * *}"
          limit="${COMPANY_GRAPH_QUEUE_SCHEDULER_LIMIT:-1}"
          body="$(jq -nc --argjson limit "$limit" '{ limit: $limit }')"
          uri="${CLOUD_RUN_URL}/api/internal/company-graph/process-queue"
          headers="Authorization=Bearer ${INTERNAL_API_TOKEN},Content-Type=application/json"

          if gcloud scheduler jobs describe "$job_name" --project "$GCP_PROJECT_ID" --location "$GCP_REGION" >/dev/null 2>&1; then
            gcloud scheduler jobs update http "$job_name" \
              --project "$GCP_PROJECT_ID" \
              --location "$GCP_REGION" \
              --schedule "$schedule" \
              --time-zone "America/New_York" \
              --uri "$uri" \
              --http-method POST \
              --update-headers "$headers" \
              --message-body "$body"
          else
            gcloud scheduler jobs create http "$job_name" \
              --project "$GCP_PROJECT_ID" \
              --location "$GCP_REGION" \
              --schedule "$schedule" \
              --time-zone "America/New_York" \
              --uri "$uri" \
              --http-method POST \
              --headers "$headers" \
              --message-body "$body"
          fi

      - name: Upsert production EOD scheduler
        env:
          CLOUD_RUN_URL: ${{ steps.production-url.outputs.url }}
          EOD_MAINTENANCE_SCHEDULER_ENABLED: ${{ vars.EOD_MAINTENANCE_SCHEDULER_ENABLED }}
          EOD_MAINTENANCE_SCHEDULER_JOB: ${{ vars.EOD_MAINTENANCE_SCHEDULER_JOB }}
          EOD_MAINTENANCE_SCHEDULER_LIMIT: ${{ vars.EOD_MAINTENANCE_SCHEDULER_LIMIT }}
          EOD_MAINTENANCE_SCHEDULER_DRY_RUN: ${{ vars.EOD_MAINTENANCE_SCHEDULER_DRY_RUN }}
          INTERNAL_API_TOKEN: ${{ env.INTERNAL_API_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${EOD_MAINTENANCE_SCHEDULER_ENABLED:-0}" != "1" ]]; then
            echo "EOD scheduler provisioning disabled for production."
            exit 0
          fi
          if [[ -z "${INTERNAL_API_TOKEN:-}" ]]; then
            echo "INTERNAL_API_TOKEN is required to provision the EOD scheduler" >&2
            exit 1
          fi

          echo "Cloud Scheduler API must be enabled once for project ${GCP_PROJECT_ID}; this workflow only creates or updates the scheduler job."

          job_name="${EOD_MAINTENANCE_SCHEDULER_JOB:-daily-eod-maintenance-production}"
          limit="${EOD_MAINTENANCE_SCHEDULER_LIMIT:-500}"
          dry_run="${EOD_MAINTENANCE_SCHEDULER_DRY_RUN:-false}"
          body="$(jq -nc --argjson limit "$limit" --argjson dryRun "$dry_run" '{ limit: $limit, dryRun: $dryRun }')"
          uri="${CLOUD_RUN_URL}/api/internal/daily-eod-maintenance"
          headers="Authorization=Bearer ${INTERNAL_API_TOKEN},Content-Type=application/json"

          if gcloud scheduler jobs describe "$job_name" --project "$GCP_PROJECT_ID" --location "$GCP_REGION" >/dev/null 2>&1; then
            gcloud scheduler jobs update http "$job_name" \
              --project "$GCP_PROJECT_ID" \
              --location "$GCP_REGION" \
              --schedule "0 20 * * 1-5" \
              --time-zone "America/New_York" \
              --uri "$uri" \
              --http-method POST \
              --update-headers "$headers" \
              --message-body "$body"
          else
            gcloud scheduler jobs create http "$job_name" \
              --project "$GCP_PROJECT_ID" \
              --location "$GCP_REGION" \
              --schedule "0 20 * * 1-5" \
              --time-zone "America/New_York" \
              --uri "$uri" \
              --http-method POST \
              --headers "$headers" \
              --message-body "$body"
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate production smoke auth token
        id: production-smoke-token
        run: |
          token="$(gcloud auth print-identity-token --audiences='${{ steps.production-url.outputs.url }}')"
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Run production smoke tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.production-url.outputs.url }}
          PLAYWRIGHT_EXPECT_STAGING_BANNER: "0"
          PLAYWRIGHT_AUTH_BEARER_TOKEN: ${{ steps.production-smoke-token.outputs.token }}
        run: npm run smoke:test
